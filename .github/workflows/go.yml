name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: go vet + test + golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Tidy
        # Phase 1a doesn't commit go.sum yet — `go mod tidy` populates it
        # from the proxy on every run. Once the Go surface stabilizes, lock
        # by committing go.sum and switching this step to `go mod download`
        # plus a `git diff --exit-code` verifier.
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          args: --timeout=5m
