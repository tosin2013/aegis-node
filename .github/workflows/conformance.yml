name: Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cross-language:
    name: Go validator ↔ Rust enforcer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      # Pinned to project MSRV (mise.toml + Cargo.toml workspace.rust-version).
      - uses: dtolnay/rust-toolchain@1.86

      - uses: Swatinem/rust-cache@v2

      - name: Go conformance
        # Both engines load the same fixture (tests/conformance/cases.json).
        # If either disagrees with the fixture, that side fails — and since
        # they share the fixture, agreeing with it transitively means the
        # two engines agree with each other.
        run: |
          go mod tidy
          go test -v -run TestConformance ./pkg/manifest/...

      - name: Rust conformance
        run: cargo test -p aegis-policy --test conformance -- --nocapture

      - name: mTLS cross-language conformance
        # Spawns the Go cmd/approver-bot from a Rust integration test
        # and asserts the approver SPIFFE ID is recorded in the Granted
        # outcome on the Rust side. See crates/approval-gate/tests/
        # mtls_conformance.rs.
        run: cargo test -p aegis-approval-gate --test mtls_conformance -- --nocapture
