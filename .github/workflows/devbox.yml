name: Devbox

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - 'mise.toml'
      - '.github/workflows/devbox.yml'
  pull_request:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - 'mise.toml'
      - '.github/workflows/devbox.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build + sign devbox image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/aegis-node-devbox:latest
            ghcr.io/${{ github.repository_owner }}/aegis-node-devbox:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign devbox image (keyless)
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/aegis-node-devbox@${DIGEST}"
