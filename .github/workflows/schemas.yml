name: Schemas

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: proto + JSON Schema + JSON-LD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.47.2

      - name: Buf lint (proto)
        run: |
          if find proto -name '*.proto' -print -quit | grep -q .; then
            buf lint proto
          else
            echo "No .proto files yet — skipping"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON Schemas (ajv)
        run: |
          shopt -s globstar nullglob
          schemas=(schemas/manifest/**/*.schema.json)
          if (( ${#schemas[@]} )); then
            for s in "${schemas[@]}"; do
              echo "Compiling $s"
              npx -y ajv-cli@5 compile -s "$s"
            done
          else
            echo "No JSON schemas yet — skipping"
          fi
        shell: bash

      - name: Validate JSON-LD contexts
        run: |
          shopt -s globstar nullglob
          contexts=(schemas/ledger/**/*.jsonld)
          if (( ${#contexts[@]} )); then
            for f in "${contexts[@]}"; do
              echo "Validating $f"
              jq empty "$f"
            done
          else
            echo "No JSON-LD contexts yet — skipping"
          fi
        shell: bash
