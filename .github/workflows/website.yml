name: Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/website.yml'
  pull_request:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/website.yml'

# Vercel handles the actual deploy. This job exists to fail PRs fast when
# the Docusaurus site can't typecheck or build — same model as the other
# language-specific workflows in this directory.
jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      # Use `npm install` not `npm ci` because we don't commit the
      # lockfile in the initial PR — the lockfile is generated on first
      # successful install in CI. Switch this to `npm ci` after the
      # lockfile lands in main (follow-up tracked in website/README.md).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
