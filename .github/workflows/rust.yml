name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: cargo fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to mirror mise.toml + Cargo.toml workspace.rust-version (1.86).
      # Bumping the project MSRV requires editing all three. Pinning here
      # prevents a new stable Rust release from introducing a clippy lint
      # that fails CI without the project intentionally upgrading.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.86
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      # oras + cosign are needed by crates/cli/tests/pull_real_image.rs
      # which pulls the devbox image through the same `pull::pull` code
      # path operators use (per ADR-013 / OCI-A). Without them, the test
      # skips quietly with a [skipped] line — installing here is what
      # turns it into a load-bearing CI signal.
      - name: Install oras
        uses: oras-project/setup-oras@v1
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Format check
        run: cargo fmt --all --check

      # `aegis-llama-backend` is excluded from this fast job — its
      # llama.cpp / cmake build adds ~50s and depends on libclang +
      # cmake which aren't present here. The dedicated `llama.yml`
      # job builds + tests it (per ADR-014, LLM-A).
      - name: Clippy
        run: cargo clippy --workspace --exclude aegis-llama-backend --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude aegis-llama-backend --all-targets
