name: Demos snapshot contract

# Per ADR-020 §"Phase 2b CI snapshot" + #73 (demo program). On every
# PR that touches demos/**, re-renders the deterministic demos to
# verify they still render — i.e. the source files (manifest / prompt
# / tape / setup.sh) successfully produce a non-empty GIF.
#
# Why not strict SHA-256: the original ADR-020 spec called for byte-
# identical re-renders against the committed GIF. In practice that
# isn't achievable across hosts even with a hermetic Dockerfile —
# VHS encodes wall-clock frame timing into the GIF, and `aegis run`
# (model inference) takes a different number of milliseconds on
# different hardware, so the captured frames differ even when the
# terminal text output is byte-identical. The relaxed contract here
# catches >90% of the contributor-mistake cases (broken tape syntax,
# manifest validation failures, setup.sh breakage, missing chat-
# template, etc.) without false-positiving on benign timing drift
# between dev machines and CI runners. Strict SHA-asserting renders
# remain available locally via `make -B -C demos NN-demo` against
# the same Dockerfile.
#
# Coverage:
#   - Demos 1, 5, 6 (Qwen2.5 + llama backend) — text output is
#     deterministic under seed=42 + temperature=0; rendering is
#     end-to-end verified.
#   - Demos 2, 3, 4 (Gemma 4 + LiteRT-LM backend) — excluded. Their
#     CPU sampler is upstream-broken (LiteRT-LM #2080/#2081); they
#     fall back to non-deterministic baked sampler params, so even
#     the text output isn't stable. Tracked in #119.
#
# Hermeticity: builds demos/Dockerfile inline (no GHCR pull
# dependency — the Dockerfile being tested is the one in this PR).
# The image pins vhs, chrome, ttyd, ffmpeg, fonts-firacode, rust, go
# so the *content* of the rendered GIF (text / fonts / colors) is
# stable. Frame timing isn't.
#
# Two-phase design:
#   1. `build-renderer` — build demos/Dockerfile once, save as a
#      tarball artifact. ~5 min cold; cached layers via gha cache
#      bring re-runs to ~30s.
#   2. `snapshot` (matrix) — download the tarball, docker load, run
#      the demo, verify the produced GIF. Each matrix item runs in
#      parallel.

on:
  pull_request:
    paths:
      - "demos/**"
      - ".github/workflows/demos.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-renderer:
    name: Build demo renderer image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute content-addressed tag
        id: tag
        run: |
          set -euo pipefail
          # Hash the Dockerfile so the cache invalidates iff the
          # build inputs (pinned versions, apt packages) change.
          dockerfile_sha=$(sha256sum demos/Dockerfile | awk '{print $1}')
          short=${dockerfile_sha:0:12}
          echo "tag=aegis-demo-renderer:sha-${short}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build renderer image
        uses: docker/build-push-action@v6
        with:
          context: demos
          file: demos/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=demos-renderer
          cache-to: type=gha,scope=demos-renderer,mode=max

      - name: Save renderer image as artifact
        run: |
          set -euo pipefail
          docker save '${{ steps.tag.outputs.tag }}' | gzip -1 > /tmp/renderer.tar.gz
          ls -lh /tmp/renderer.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: demos-renderer-image
          path: /tmp/renderer.tar.gz
          retention-days: 1

  snapshot:
    name: ${{ matrix.demo }}
    needs: build-renderer
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        demo:
          - 01-mcp-sandboxed-twice
          - 05-tampered-model-halts
          - 06-egress-containment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: demos-renderer-image
          path: /tmp

      - name: Load renderer image
        id: load
        run: |
          set -euo pipefail
          docker load < /tmp/renderer.tar.gz
          docker image ls
          echo "tag=${{ needs.build-renderer.outputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo-shared/registry
            ~/.cargo-shared/git
          key: ${{ runner.os }}-demos-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-demos-cargo-

      - name: Render ${{ matrix.demo }} inside the renderer image
        run: |
          set -euo pipefail
          DEMO='${{ matrix.demo }}'
          mkdir -p ~/.cargo-shared/registry ~/.cargo-shared/git
          # Save the committed GIF before re-rendering, so we can
          # diff it against the freshly-rendered one.
          cp "demos/${DEMO}/demo.gif" "/tmp/${DEMO}.expected.gif"

          docker run --rm \
            -v "$GITHUB_WORKSPACE":/root/aegis-node \
            -v "$HOME/.cargo-shared/registry":/root/.cargo/registry \
            -v "$HOME/.cargo-shared/git":/root/.cargo/git \
            -w /root/aegis-node \
            '${{ steps.load.outputs.tag }}' \
            /bin/bash -ce '
              set -euo pipefail
              # Build aegis CLI (--features llama). The renderer image
              # has rust 1.95.0 pinned.
              cargo build --release -p aegis-cli --features llama
              install -m 0755 target/release/aegis /usr/local/bin/aegis
              aegis --version || aegis --help
              # Force re-render the demo via the Makefile (setup.sh
              # auto-runs per the %/demo.gif rule).
              cd demos
              make -B "'"${DEMO}"'"
            '

          mv "demos/${DEMO}/demo.gif" "/tmp/${DEMO}.actual.gif"
          # Restore the committed GIF so subsequent steps see a clean
          # tree.
          cp "/tmp/${DEMO}.expected.gif" "demos/${DEMO}/demo.gif"

      - name: Verify rendered GIF
        run: |
          set -euo pipefail
          DEMO='${{ matrix.demo }}'
          gif="/tmp/${DEMO}.actual.gif"
          if [[ ! -f "$gif" ]]; then
            echo "::error title=Demo GIF missing::Render produced no output for ${DEMO}." >&2
            exit 1
          fi
          # File-size lower bound: the committed GIFs are 1-7 MB.
          # 100 KB is far below the smallest realistic render but well
          # above an "error-frame-only" GIF (~2-5 KB) — i.e. it
          # discriminates "demo rendered something substantive" from
          # "demo failed to produce content but wrote a stub GIF."
          size=$(stat -c%s "$gif")
          if (( size < 100000 )); then
            echo "::error title=Demo GIF too small::"
            echo "  ${DEMO}/demo.gif rendered to ${size} bytes (<100 KB)."
            echo "  The render likely produced an error-frame-only GIF."
            echo "  Inspect the uploaded artifact for the actual content."
            exit 1
          fi
          # Sanity: the rendered GIF has a reasonable length (frame
          # count). gifsicle isn't in the renderer image, so we use
          # `file` to surface the dimensions/version line — purely
          # informational. The size check above is the load-bearing
          # guard.
          file "$gif"
          expected_sha=$(sha256sum "/tmp/${DEMO}.expected.gif" | awk '{print $1}')
          actual_sha=$(sha256sum   "$gif"                       | awk '{print $1}')
          echo "::notice title=Demo GIF rendered::${DEMO} produced ${size}-byte GIF"
          echo "  committed sha: ${expected_sha}"
          echo "  rendered sha:  ${actual_sha}"
          if [[ "$expected_sha" == "$actual_sha" ]]; then
            echo "  (SHAs match — rendered byte-identically)"
          else
            echo "  (SHAs differ — expected on cross-host renders; not a failure)"
          fi

      - name: Upload rendered GIF on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.demo }}-rendered
          path: /tmp/${{ matrix.demo }}.actual.gif
          retention-days: 7
