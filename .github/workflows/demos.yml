name: Demos snapshot contract

# Per ADR-020 §"Phase 2b CI snapshot" + #73 (demo program). On every
# PR that touches demos/**, re-renders the deterministic demos and
# asserts each rendered GIF's SHA-256 matches the committed GIF.
#
# Coverage:
#   - Demos 1, 5, 6 (Qwen2.5 + llama backend) — fully deterministic
#     under seed=42 + temperature=0; SHA-asserted.
#   - Demos 2, 3, 4 (Gemma 4 + LiteRT-LM backend) — excluded until
#     LiteRT-LM #2080/#2081 (CPU sampler UNIMPLEMENTED) lands. Their
#     rendering falls back to non-deterministic baked sampler params;
#     no stable SHA contract is possible. Tracked in #119.
#
# Hermeticity: builds demos/Dockerfile inline (no GHCR pull
# dependency — the Dockerfile being tested is the one in this PR).
# The image pins vhs, chrome, ttyd, ffmpeg, fonts-firacode, rust, go
# — every input the GIF SHA depends on. Without it, the same `aegis
# run` would produce a different GIF on a stock GH Actions runner
# due to font / chrome / vhs version drift.
#
# Two-phase design:
#   1. `build-renderer` — build demos/Dockerfile once, save as a
#      tarball artifact. ~5 min cold; cached layers via gha cache
#      bring re-runs to ~30s.
#   2. `snapshot` (matrix) — download the tarball, docker load, run
#      the demo, assert SHA. Each matrix item runs in parallel.
#
# Failure UX: when a contributor changes a demo's source (manifest /
# prompt / tape), the SHA check fails with a clear "re-render and
# commit demo.gif" message, and the rendered .gif is uploaded as an
# artifact for inspection.

on:
  pull_request:
    paths:
      - "demos/**"
      - ".github/workflows/demos.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-renderer:
    name: Build demo renderer image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute content-addressed tag
        id: tag
        run: |
          set -euo pipefail
          # Hash the Dockerfile so the cache invalidates iff the
          # build inputs (pinned versions, apt packages) change.
          dockerfile_sha=$(sha256sum demos/Dockerfile | awk '{print $1}')
          short=${dockerfile_sha:0:12}
          echo "tag=aegis-demo-renderer:sha-${short}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build renderer image
        uses: docker/build-push-action@v6
        with:
          context: demos
          file: demos/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=demos-renderer
          cache-to: type=gha,scope=demos-renderer,mode=max

      - name: Save renderer image as artifact
        run: |
          set -euo pipefail
          docker save '${{ steps.tag.outputs.tag }}' | gzip -1 > /tmp/renderer.tar.gz
          ls -lh /tmp/renderer.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: demos-renderer-image
          path: /tmp/renderer.tar.gz
          retention-days: 1

  snapshot:
    name: ${{ matrix.demo }}
    needs: build-renderer
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        demo:
          - 01-mcp-sandboxed-twice
          - 05-tampered-model-halts
          - 06-egress-containment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: demos-renderer-image
          path: /tmp

      - name: Load renderer image
        id: load
        run: |
          set -euo pipefail
          docker load < /tmp/renderer.tar.gz
          docker image ls | head -5
          echo "tag=${{ needs.build-renderer.outputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo-shared/registry
            ~/.cargo-shared/git
          key: ${{ runner.os }}-demos-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-demos-cargo-

      - name: Render ${{ matrix.demo }} inside the renderer image
        run: |
          set -euo pipefail
          DEMO='${{ matrix.demo }}'
          mkdir -p ~/.cargo-shared/registry ~/.cargo-shared/git
          # Save the committed GIF before re-rendering, so we can
          # diff it against the freshly-rendered one.
          cp "demos/${DEMO}/demo.gif" "/tmp/${DEMO}.expected.gif"

          docker run --rm \
            -v "$GITHUB_WORKSPACE":/root/aegis-node \
            -v "$HOME/.cargo-shared/registry":/root/.cargo/registry \
            -v "$HOME/.cargo-shared/git":/root/.cargo/git \
            -w /root/aegis-node \
            '${{ steps.load.outputs.tag }}' \
            /bin/bash -ce '
              set -euo pipefail
              # Build aegis CLI (--features llama). The renderer image
              # has rust 1.95.0 pinned.
              cargo build --release -p aegis-cli --features llama
              install -m 0755 target/release/aegis /usr/local/bin/aegis
              aegis --help | head -3
              # Force re-render the demo via the Makefile (setup.sh
              # auto-runs per the %/demo.gif rule).
              cd demos
              make -B "'"${DEMO}"'"
            '

          mv "demos/${DEMO}/demo.gif" "/tmp/${DEMO}.actual.gif"
          # Restore the committed GIF so subsequent steps see a clean
          # tree.
          cp "/tmp/${DEMO}.expected.gif" "demos/${DEMO}/demo.gif"

      - name: Assert SHA-256 matches committed GIF
        run: |
          set -euo pipefail
          DEMO='${{ matrix.demo }}'
          expected_sha=$(sha256sum "/tmp/${DEMO}.expected.gif" | awk '{print $1}')
          actual_sha=$(sha256sum "/tmp/${DEMO}.actual.gif"   | awk '{print $1}')
          echo "expected: ${expected_sha}"
          echo "actual:   ${actual_sha}"
          if [[ "$expected_sha" != "$actual_sha" ]]; then
            echo "::error title=Demo GIF SHA mismatch::"
            echo "  ${DEMO}/demo.gif drifted."
            echo
            echo "Either:"
            echo "  (a) you changed manifest.yaml / prompt.txt / demo.tape and"
            echo "      need to re-render and commit the new demo.gif, or"
            echo "  (b) something non-deterministic leaked into the render path"
            echo "      (apt drift in the renderer image, model-output non-"
            echo "      determinism, etc.) — investigate before committing."
            echo
            echo "Re-render locally:"
            echo "  make -B -C demos ${DEMO}"
            echo "Then: git add demos/${DEMO}/demo.gif && git commit"
            exit 1
          fi
          echo "::notice title=Demo GIF SHA OK::${DEMO}/demo.gif: ${actual_sha}"

      - name: Upload rendered GIF on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.demo }}-rendered
          path: /tmp/${{ matrix.demo }}.actual.gif
          retention-days: 7
