name: Publish LiteRT-LM runtime OCI artifact

# Per ADR-023 + LiteRT-D (#119) — manual-dispatch publish of the
# LiteRT-LM runtime `.so`. Each invocation:
#
#   1. Checks out the LiteRT-LM source at `<upstream_owner>/<upstream_repo>@<upstream_tag>`.
#      Default owner/repo is `google-ai-edge/LiteRT-LM`; the inputs
#      let an operator point at a fork (e.g. `tosin2013/LiteRT-LM`)
#      that carries Aegis-side patches against upstream-broken
#      paths — the bridge we use for upstream gaps Google hasn't
#      addressed yet, e.g. the CPU decode crash on Gemma 4 we filed
#      as `google-ai-edge/LiteRT-LM#2149`.
#   2. Installs Bazel + clang.
#   3. Appends the Aegis overlay to upstream's `c/BUILD` — a
#      `cc_binary(linkshared=True, linkstatic=True)` mirror of
#      upstream's own `python/litert_lm/litert_lm_ext.so` rule that
#      bundles `engine_cpu`'s transitive deps (incl. the Rust
#      `llguidance` crate) into a single `.so` consumable from
#      outside Bazel.
#   4. Runs `bazel build //c:libaegis_litertlm_engine_cpu.so`
#      (CPU-only — Phase 1 per ADR-023 §"Decision" item 3).
#   5. Bundles the four upstream-vendored prebuilt sidekicks
#      (`libGemmaModelConstraintProvider`, `libLiteRt`,
#      `libLiteRtTopKWebGpuSampler`, `libLiteRtWebGpuAccelerator`).
#   6. Computes SHA-256s and pushes via `oras` to GHCR with the
#      `application/vnd.aegis-node.litertlm-runtime.v1` artifact-type.
#   7. `cosign sign --yes` keyless via Sigstore Fulcio + Rekor.
#   8. Prints pinning info for the ADR-023 amendment + LiteRT-A
#      (#95)'s `litertlm-sys/build.rs`.
#
# License: LiteRT-LM is Apache-2.0 (clean for vendoring + redistribution).
# Apache-2.0 LICENSE file is preserved alongside the .so in the OCI
# artifact via an annotation pointing at the upstream commit.

on:
  workflow_dispatch:
    inputs:
      upstream_owner:
        description: "GitHub owner of the LiteRT-LM source (default upstream; override to fork — e.g. tosin2013 — when shipping Aegis-side patches against upstream-broken paths per LiteRT-D / #119)"
        required: false
        default: "google-ai-edge"
        type: string
      upstream_repo:
        description: "Repo name of the LiteRT-LM source (rarely changed; left as input for forks that rename)"
        required: false
        default: "LiteRT-LM"
        type: string
      upstream_tag:
        description: "Tag (or branch) to build (e.g. v0.10.2 or aegis/v0.10.2-base when building from a fork)"
        required: true
        default: "v0.10.2"
        type: string
      bazel_version:
        description: "Bazel version to use (must match upstream's .bazelversion)"
        required: false
        default: "7.6.1"
        type: string
      target_repo:
        description: "GHCR repo path (defaults to ghcr.io/<owner>/aegis-node-runtime/litertlm-linux-amd64)"
        required: false
        type: string
      target_tag:
        description: "OCI tag for human discoverability (the digest is the load-bearing pin)"
        required: false
        default: "latest"
        type: string

permissions:
  contents: read
  packages: write     # GHCR push
  id-token: write     # cosign keyless via Sigstore Fulcio

jobs:
  publish:
    name: Bazel → .so → OCI → cosign
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate upstream_tag shape
        run: |
          tag='${{ inputs.upstream_tag }}'
          # Accept v<semver>, v<semver>-rc.N, or aegis/* fork
          # branches (per LiteRT-D #119 — the fork-branch path lets
          # operators dispatch against patched branches like
          # aegis/v0.10.2-base while the upstream tag itself is
          # still the canonical reference for cosign annotations).
          if [[ ! "$tag" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+(-rc(\.[0-9]+)?)?|aegis/.+)$ ]]; then
            echo "::error::upstream_tag must look like v<semver>, v<semver>-rc[.N], or aegis/<branch> (got '$tag')." >&2
            exit 2
          fi

      - name: Checkout LiteRT-LM source at pinned tag
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.upstream_owner }}/${{ inputs.upstream_repo }}
          ref: ${{ inputs.upstream_tag }}
          path: upstream
          # We need to capture the resolved commit SHA for the OCI
          # annotation; fetch enough history to read it.
          fetch-depth: 1
          # `prebuilt/<platform>/libGemmaModelConstraintProvider.so`
          # (vendored binary used by the constrained-decoding feature
          # — Gemma's tool-call grammar enforcer) is Git-LFS-tracked.
          # Without LFS, the checkout writes a pointer file (~130
          # bytes of text starting with `version https://git-lfs.../v1`)
          # which lld then misreads as a linker version script,
          # exploding the build with `unknown directive: version`.
          # First-dispatch postmortem: run 25221781498.
          lfs: true

      - name: Resolve upstream commit SHA
        id: upstream
        run: |
          set -euo pipefail
          cd upstream
          sha=$(git rev-parse HEAD)
          echo "commit=${sha}" >> "$GITHUB_OUTPUT"
          echo "Upstream commit: ${sha}"

      - name: Install Bazel ${{ inputs.bazel_version }}
        uses: bazel-contrib/setup-bazel@0.13.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ inputs.upstream_tag }}
          repository-cache: true

      - name: Install clang + llvm
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm

      - name: Pin Bazel version locally
        run: |
          set -euo pipefail
          cd upstream
          # Use the version the upstream pins, OR the one the operator
          # specified — the input default matches upstream's
          # .bazelversion at v0.10.2 (7.6.1). If they diverge, prefer
          # upstream's pin so the build matches what upstream tested.
          if [[ -f .bazelversion ]]; then
            cat .bazelversion
          fi
          # Bazelisk respects USE_BAZEL_VERSION too:
          echo "USE_BAZEL_VERSION=${{ inputs.bazel_version }}" >> "$GITHUB_ENV"

      - name: Add Aegis overlay — cc_binary(linkshared) on top of //c:engine_cpu
        run: |
          set -euo pipefail
          cd upstream
          # The upstream c/BUILD declares `engine_cpu` as a cc_library
          # (a static archive). We need a single shared library
          # consumable from outside Bazel — append a small overlay rule.
          #
          # First attempt used cc_shared_library (run 25234002154); that
          # produced a .so with unresolved llg_* symbols at runtime
          # because Bazel's cc_shared_library skips Rust-managed cc deps
          # like @crate_index__llguidance-1.3.0//:llguidance_cc. The .so
          # would load, but the first call into the constrained-decoding
          # path (used by Gemma's tool-call decoder) failed with a
          # symbol lookup error.
          #
          # cc_binary(linkshared=True, linkstatic=True) is the pattern
          # upstream itself uses for python/litert_lm/litert_lm_ext.so —
          # it bundles ALL transitive deps statically, including the
          # llguidance Rust crate. Same linkopts upstream uses for
          # parity (see python/litert_lm/BUILD):
          #   -Wl,-Bsymbolic        — prefer in-binary symbols (avoids
          #                           accidental shadowing by a host
          #                           libllguidance if one exists).
          #   -Wl,-rpath,'$ORIGIN'  — find sibling prebuilt .so files
          #                           (libLiteRt, libGemma...) without
          #                           needing LD_LIBRARY_PATH.
          #   -Wl,-z,noexecstack    — non-executable stack (modern
          #                           NX/SELinux compat, b/496655352).
          cat >> c/BUILD <<'EOF'

          # --- Aegis-Node overlay (added by litertlm-runtime-publish.yml) ---
          # cc_binary(linkshared) that bundles engine_cpu's transitive
          # deps — including the llguidance Rust crate — into a single
          # .so for distribution outside Bazel. Mirrors upstream's
          # python/litert_lm/litert_lm_ext.so pattern.
          cc_binary(
              name = "libaegis_litertlm_engine_cpu.so",
              copts = [
                  "-fexceptions",
                  "-fvisibility=hidden",
              ],
              features = ["-use_header_modules"],
              linkopts = [
                  "-Wl,-Bsymbolic",
                  "-Wl,-rpath,'$$ORIGIN'",
                  "-Wl,-z,noexecstack",
              ],
              linkshared = True,
              deps = [":engine_cpu"],
              visibility = ["//visibility:public"],
          )
          EOF
          echo "--- appended overlay ---"
          tail -22 c/BUILD

      - name: Build //c:libaegis_litertlm_engine_cpu.so
        id: build
        run: |
          set -euo pipefail
          cd upstream
          # CPU-only build, optimized. -c opt is the release config.
          # cc_binary's name carries the .so extension explicitly so
          # the produced file is exactly `libaegis_litertlm_engine_cpu.so`.
          bazel build -c opt //c:libaegis_litertlm_engine_cpu.so

          # Locate the built .so under bazel-bin/c/.
          out=$(find bazel-bin/c -maxdepth 2 -name 'libaegis_litertlm_engine_cpu.so' -print -quit)
          if [[ -z "$out" || ! -f "$out" ]]; then
            echo "::error::Could not locate libaegis_litertlm_engine_cpu.so under bazel-bin/c/" >&2
            ls -la bazel-bin/c/ || true
            exit 2
          fi
          # Copy out of the Bazel sandbox so subsequent steps can
          # operate on a stable path.
          mkdir -p ../artifact
          cp "$out" ../artifact/libaegis_litertlm_engine_cpu.so

          # Bundle ALL FOUR vendored prebuilts that the engine .so
          # transitively pulls at runtime. Same set upstream itself
          # ships with python/litert_lm's wheel (see
          # _PREBUILT_LIBS in python/litert_lm/BUILD). The engine .so's
          # rpath is set to `$ORIGIN` so the dynamic linker resolves
          # them via the same staging directory at session-load time.
          #   - libGemmaModelConstraintProvider.so — constrained-decoding
          #     for Gemma's tool-call grammar.
          #   - libLiteRt.so — the LiteRT (TFLite) Rust runtime.
          #   - libLiteRtTopKWebGpuSampler.so — WebGPU sampler shim
          #     (kept on Linux for symbol resolution; Phase 1 doesn't
          #     activate the WebGPU path).
          #   - libLiteRtWebGpuAccelerator.so — WebGPU accelerator
          #     shim (same).
          PREBUILTS="libGemmaModelConstraintProvider.so libLiteRt.so libLiteRtTopKWebGpuSampler.so libLiteRtWebGpuAccelerator.so"
          for pb in $PREBUILTS; do
            src=$(find prebuilt/linux_x86_64 -name "$pb" -print -quit 2>/dev/null || true)
            if [[ -z "$src" || ! -f "$src" ]]; then
              echo "::error::Could not locate $pb under upstream/prebuilt/linux_x86_64/ (LFS pull may have failed)." >&2
              ls -la prebuilt/linux_x86_64/ || true
              exit 2
            fi
            # Defense-in-depth: detect LFS pointer files vs real binaries.
            if head -c 8 "$src" | grep -q 'version'; then
              echo "::error::$src is an LFS pointer file, not the binary. Re-check actions/checkout's lfs:true setting." >&2
              head -c 200 "$src" || true
              exit 2
            fi
            cp "$src" "../artifact/$pb"
          done

          echo "path=$(realpath ../artifact/libaegis_litertlm_engine_cpu.so)" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$(realpath ../artifact)" >> "$GITHUB_OUTPUT"
          ls -lh ../artifact/

      - name: Compute SHA-256s of every runtime .so
        id: sha
        run: |
          set -euo pipefail
          artifact_dir='${{ steps.build.outputs.artifact_dir }}'
          # Hardcoded (filename, output-key) pairs — auto-derivation
          # from the filename via sed+tr was fragile against camelCase
          # collapses (one prior run produced an empty
          # sha_litertopkwebgpusampler annotation for unclear reasons,
          # likely a TR locale mismatch). Hardcoding is unambiguous.
          declare -A keys=(
            [libaegis_litertlm_engine_cpu.so]=engine
            [libGemmaModelConstraintProvider.so]=constraint_provider
            [libLiteRt.so]=litert
            [libLiteRtTopKWebGpuSampler.so]=litert_topk_webgpu_sampler
            [libLiteRtWebGpuAccelerator.so]=litert_webgpu_accelerator
          )
          for f in "${!keys[@]}"; do
            d=$(sha256sum "$artifact_dir/$f" | awk '{print $1}')
            echo "${f}: ${d}"
            echo "sha_${keys[$f]}=${d}" >> "$GITHUB_OUTPUT"
          done

      - name: Capture build environment metadata
        id: env
        run: |
          set -euo pipefail
          glibc_ver=$(ldd --version | head -1 | awk '{print $NF}')
          bazel_actual=$(cd upstream && bazel --version | head -1 | awk '{print $2}')
          # Hash the upstream c/engine.h so litertlm-sys's bindgen has
          # a checksum to verify the headers it generates against
          # match what was built into this .so.
          header_sha=$(sha256sum upstream/c/engine.h | awk '{print $1}')
          echo "glibc=${glibc_ver}" >> "$GITHUB_OUTPUT"
          echo "bazel=${bazel_actual}" >> "$GITHUB_OUTPUT"
          echo "header_sha=${header_sha}" >> "$GITHUB_OUTPUT"
          echo "glibc:      ${glibc_ver}"
          echo "bazel:      ${bazel_actual}"
          echo "header sha: ${header_sha}"

      - name: Compute target ref
        id: target
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          target_repo='${{ inputs.target_repo }}'
          if [[ -z "$target_repo" ]]; then
            target_repo="ghcr.io/${owner}/aegis-node-runtime/litertlm-linux-amd64"
          fi
          target_tag='${{ inputs.target_tag }}'
          echo "ref=${target_repo}:${target_tag}" >> "$GITHUB_OUTPUT"
          echo "repo=${target_repo}" >> "$GITHUB_OUTPUT"
          echo "Target: ${target_repo}:${target_tag}"

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Push as single-blob OCI artifact
        id: push
        env:
          ORAS_USERNAME: ${{ github.actor }}
          ORAS_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$ORAS_PASSWORD" | oras login ghcr.io --username "$ORAS_USERNAME" --password-stdin

          ref='${{ steps.target.outputs.ref }}'
          # `oras push` refuses absolute paths in layer names; cd into
          # the artifact dir so the layer titles are bare filenames.
          artifact_dir='${{ steps.build.outputs.artifact_dir }}'
          cd "$artifact_dir"

          oras push "$ref" \
            --artifact-type "application/vnd.aegis-node.litertlm-runtime.v1" \
            --annotation "org.opencontainers.image.source=https://github.com/${{ inputs.upstream_owner }}/${{ inputs.upstream_repo }}" \
            --annotation "org.opencontainers.image.revision=${{ steps.upstream.outputs.commit }}" \
            --annotation "org.opencontainers.image.title=libaegis_litertlm_engine_cpu.so" \
            --annotation "dev.aegis-node.upstream=github" \
            --annotation "dev.aegis-node.upstream.repo=${{ inputs.upstream_owner }}/${{ inputs.upstream_repo }}" \
            --annotation "dev.aegis-node.upstream.tag=${{ inputs.upstream_tag }}" \
            --annotation "dev.aegis-node.upstream.commit=${{ steps.upstream.outputs.commit }}" \
            --annotation "dev.aegis-node.bazel.version=${{ steps.env.outputs.bazel }}" \
            --annotation "dev.aegis-node.bazel.target=//c:libaegis_litertlm_engine_cpu.so" \
            --annotation "dev.aegis-node.glibc.target=${{ steps.env.outputs.glibc }}" \
            --annotation "dev.aegis-node.runtime.so.sha256=${{ steps.sha.outputs.sha_engine }}" \
            --annotation "dev.aegis-node.runtime.constraint_provider_so.sha256=${{ steps.sha.outputs.sha_constraint_provider }}" \
            --annotation "dev.aegis-node.runtime.litert_so.sha256=${{ steps.sha.outputs.sha_litert }}" \
            --annotation "dev.aegis-node.runtime.litert_topk_webgpu_sampler_so.sha256=${{ steps.sha.outputs.sha_litert_topk_webgpu_sampler }}" \
            --annotation "dev.aegis-node.runtime.litert_webgpu_accelerator_so.sha256=${{ steps.sha.outputs.sha_litert_webgpu_accelerator }}" \
            --annotation "dev.aegis-node.runtime.header.sha256=${{ steps.env.outputs.header_sha }}" \
            --annotation "dev.aegis-node.runtime.platform=linux/amd64" \
            --annotation "dev.aegis-node.runtime.kind=cpu-only" \
            "libaegis_litertlm_engine_cpu.so:application/vnd.aegis-node.litertlm-runtime.v1" \
            "libGemmaModelConstraintProvider.so:application/vnd.aegis-node.litertlm-runtime-constraint-provider.v1" \
            "libLiteRt.so:application/vnd.aegis-node.litertlm-runtime-litert.v1" \
            "libLiteRtTopKWebGpuSampler.so:application/vnd.aegis-node.litertlm-runtime-litert-topk-webgpu.v1" \
            "libLiteRtWebGpuAccelerator.so:application/vnd.aegis-node.litertlm-runtime-litert-webgpu.v1"

          desc=$(oras manifest fetch --descriptor "$ref")
          manifest_digest=$(echo "$desc" | jq -r '.digest')
          echo "manifest_digest=${manifest_digest}" >> "$GITHUB_OUTPUT"
          echo "Pushed: ${ref}@${manifest_digest}"

      - name: Sign with cosign (Sigstore keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          ref='${{ steps.target.outputs.ref }}'
          digest='${{ steps.push.outputs.manifest_digest }}'
          cosign sign "${ref}@${digest}"

      - name: Verify the signature we just produced
        run: |
          set -euo pipefail
          ref='${{ steps.target.outputs.ref }}'
          digest='${{ steps.push.outputs.manifest_digest }}'
          cosign verify "${ref}@${digest}" \
            --certificate-identity-regexp "^https://github\.com/${{ github.repository }}/\.github/workflows/litertlm-runtime-publish\.yml@.*$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Print pinning info for ADR-023 + LiteRT-A
        run: |
          echo "::notice title=Published LiteRT-LM runtime artifact::"
          echo "ref:                                ${{ steps.target.outputs.ref }}"
          echo "manifest_digest:                    ${{ steps.push.outputs.manifest_digest }}"
          echo "engine_cpu .so sha256:              ${{ steps.sha.outputs.sha_engine }}"
          echo "constraint_provider .so sha256:     ${{ steps.sha.outputs.sha_constraint_provider }}"
          echo "litert .so sha256:                  ${{ steps.sha.outputs.sha_litert }}"
          echo "litert_topk_webgpu_sampler sha256:  ${{ steps.sha.outputs.sha_litert_topk_webgpu_sampler }}"
          echo "litert_webgpu_accelerator sha256:   ${{ steps.sha.outputs.sha_litert_webgpu_accelerator }}"
          echo "header sha256:                      ${{ steps.env.outputs.header_sha }}"
          echo "upstream tag:                       ${{ inputs.upstream_tag }}"
          echo "upstream commit:                    ${{ steps.upstream.outputs.commit }}"
          echo "bazel:                              ${{ steps.env.outputs.bazel }}"
          echo "glibc target:                       ${{ steps.env.outputs.glibc }}"
          echo "platform:                           linux/amd64 (cpu-only)"
          echo
          echo "Pin in ADR-023 §Update + crates/litertlm-sys/build.rs:"
          echo "  ${{ steps.target.outputs.ref }}@${{ steps.push.outputs.manifest_digest }}"
